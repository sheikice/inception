volumes:
  wordpress:
    driver: local
    driver_opts:
# change for /home/login/data
      device: ~/data/wordpress
      o: bind
      type: none
  mariadb:
    driver: local
    driver_opts:
# change for /home/login/data
      device: ~/data/mariadb
      o: bind
      type: none

networks:
  inception:
    name: inception

services:
  nginx:
    container_name: nginx
    ports:
      - "443:443"
    depends_on:
      - wordpress
    build: ./requirements/nginx
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    restart: always

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inception
    restart: always

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception
    restart: always
