name: "${DOMAIN_NAME}"

secrets:
  mysql_password:
    file: ../secrets/mysql_password.txt
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  ftp_user_password:
    file: ../secrets/ftp_user_password.txt

volumes:
  wordpress:
    driver: local
    driver_opts:
      device: "${DEVICE_PATH}/wordpress"
      o: bind
      type: none
  mariadb:
    driver: local
    driver_opts:
      device: "${DEVICE_PATH}/mariadb"
      o: bind
      type: none

networks:
  inception:
    name: inception

services:
  nginx:
    container_name: nginx
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    depends_on:
      - wordpress
      - lighttpd
    build: ./requirements/nginx
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    restart: always

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    secrets:
      - mysql_password
      - mysql_root_password
      - wp_admin_password
      - wp_user_password
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - mariadb
      - redis
    networks:
      - inception
    restart: always

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - mariadb:/var/lib/mysql
    secrets:
      - mysql_password
      - mysql_root_password
    env_file:
      - .env
    networks:
      - inception
    restart: always

  redis:
    container_name: redis
    build: ./requirements/redis
    env_file:
      - .env
    networks:
      - inception
    restart: always

  lighttpd:
    container_name: lighttpd
    build: ./requirements/lighttpd
    env_file:
      - .env
    networks:
      - inception
    restart: always


  ftp:
    container_name: ftp
    build: ./requirements/ftp
    ports:
      - "21:21"
      - "30000-30005:30000-30005"
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - wordpress
    env_file:
      - .env
    secrets:
    - ftp_user_password
    networks:
      - inception
    stop_grace_period: 1s
    restart: always
