secrets:
  mysql_database:
    file: ../secrets/mysql_database.txt
  mysql_user:
    file: ../secrets/mysql_user.txt
  mysql_password:
    file: ../secrets/mysql_password.txt
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt
  wp_admin_user:
    file: ../secrets/wp_admin_user.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_admin_email:
    file: ../secrets/wp_admin_email.txt
  wp_user:
    file: ../secrets/wp_user.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  wp_user_email:
    file: ../secrets/wp_user_email.txt
  domain_name:
    file: ../secrets/domain_name.txt


volumes:
  wordpress:
    driver: local
    driver_opts:
# change for /home/login/data
      device: ~/data/wordpress
      o: bind
      type: none
  mariadb:
    driver: local
    driver_opts:
# change for /home/login/data
      device: ~/data/mariadb
      o: bind
      type: none

networks:
  inception:
    name: inception

services:
  nginx:
    container_name: nginx
    ports:
      - "443:443"
    depends_on:
      - wordpress
    build: ./requirements/nginx
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    restart: always

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    secrets:
      - mysql_database
      - mysql_user
      - mysql_password
      - mysql_root_password
      - wp_admin_user
      - wp_admin_password
      - wp_admin_email
      - wp_user
      - wp_user_password
      - wp_user_email
      - domain_name


    volumes:
      - wordpress:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inception
    restart: always

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - mariadb:/var/lib/mysql
    secrets:
      - mysql_database
      - mysql_user
      - mysql_password
      - mysql_root_password
    networks:
      - inception
    restart: always

