secrets:
  mysql_password:
    file: ../secrets/mysql_password.txt
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

volumes:
  wordpress:
    driver: local
    driver_opts:
# change for /home/login/data
      device: ~/data/wordpress
      o: bind
      type: none
  mariadb:
    driver: local
    driver_opts:
# change for /home/login/data
      device: ~/data/mariadb
      o: bind
      type: none

networks:
  inception:
    name: inception

services:
  nginx:
    container_name: nginx
    ports:
      - "443:443"
    depends_on:
      - wordpress
    build: ./requirements/nginx
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    restart: always

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    secrets:
      - mysql_password
      - mysql_root_password
      - wp_admin_password
      - wp_user_password
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inception
    restart: always

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - mariadb:/var/lib/mysql
    secrets:
      - mysql_password
      - mysql_root_password
    env_file:
      - .env
    networks:
      - inception
    restart: always

